name: Remove Deployment

on:
  workflow_dispatch:

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Remove App from Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 64280
          script: |
            export XDG_RUNTIME_DIR="/run/user/$(id -u)"
            export DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus"

            REPO_NAME="${{ github.event.repository.name }}"

            APP_DIR="$HOME/app/${REPO_NAME}"
            SERVICE_FILE="${REPO_NAME}.service"
            SYSTEMD_USER_DIR="$HOME/.config/systemd/user"

            echo "🚮 Removal process started for: $REPO_NAME"

            if systemctl --user list-unit-files | grep -q "$SERVICE_FILE"; then
                echo "🛑 Stopping and disabling systemd service..."
                systemctl --user stop "$REPO_NAME"
                systemctl --user disable "$REPO_NAME"
                systemctl --user daemon-reload
                systemctl --user reset-failed
            else
                echo "⚠️ Service $SERVICE_FILE not found, skipping..."
            fi

            if [ -L "$SYSTEMD_USER_DIR/$SERVICE_FILE" ]; then
                echo "🔗 Removing symbolic link..."
                rm "$SYSTEMD_USER_DIR/$SERVICE_FILE"
            fi

            if [ -d "$APP_DIR" ]; then
                echo "📂 Removing application directory: $APP_DIR"
                rm -rf "$APP_DIR"
            else
                echo "⚠️ Directory $APP_DIR does not exist, skipping..."
            fi

            echo "✅ Cleanup complete! All traces of $REPO_NAME have been removed."